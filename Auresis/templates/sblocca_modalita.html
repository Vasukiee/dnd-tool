{% extends "base.html" %}
{% block title %}Sblocco — Il Registro{% endblock %}
{% block content %}

<div class="page-header">
    <p class="page-eyebrow">Modalità giocatrice</p>
    <h1 class="page-title">Inserisci la password</h1>
</div>

<form method="post" action="{{ url_for('sblocca_modalita') }}" style="max-width: 360px;">
    <input type="hidden" name="next" value="{{ next_url }}">
    <div style="margin-bottom: 16px;">
        <label class="form-label" for="password">Password master</label>
        <input class="form-input" type="password" id="password" name="password" autofocus required>
    </div>
    <div style="display: flex; gap: 8px;">
        <button type="submit" class="btn">Sblocca</button>
        <a href="{{ next_url }}" class="btn btn--ghost">Annulla</a>
    </div>
</form>

{% endblock %}
