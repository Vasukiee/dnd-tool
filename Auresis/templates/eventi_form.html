{% extends "base.html" %}
{% block title %}Registra evento — Il Registro{% endblock %}
{% block content %}

<div class="page-header">
    <p class="page-eyebrow">Nuova voce di cronaca</p>
    <h1 class="page-title">Registra evento</h1>
</div>

<form method="POST" class="form-grid">
    <div class="form-field">
        <label for="sessione">Numero sessione</label>
        <input type="number" id="sessione" name="sessione" required>
    </div>

    <div class="form-field">
        <label for="riassunto">Riassunto (1-3 frasi, fattuale)</label>
        <textarea id="riassunto" name="riassunto" required></textarea>
    </div>

    <div class="form-field">
        <label for="conseguenze_attive">Conseguenze ancora attive (opzionale)</label>
        <textarea id="conseguenze_attive" name="conseguenze_attive"></textarea>
    </div>

    <div class="form-field">
        <label for="location_id">Location (opzionale)</label>
        <select id="location_id" name="location_id">
            <option value="">— nessuna —</option>
            {% for l in locations %}
            <option value="{{ l.id }}">{{ l.nome }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="actions-row">
        <button type="submit" class="btn">Registra</button>
        <a class="btn btn--ghost" href="{{ url_for('lista_eventi') }}">Annulla</a>
    </div>
</form>

{% endblock %}
