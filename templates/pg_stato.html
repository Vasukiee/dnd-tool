{% extends "base.html" %}
{% block title %}Il Soggetto — Il Registro{% endblock %}
{% block content %}

<div class="page-header">
    <p class="page-eyebrow">Scheda del personaggio</p>
    <h1 class="page-title">Il Soggetto</h1>
</div>

<form method="POST" class="form-grid">
    <div class="form-field">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" value="{{ pg.nome if pg else '' }}">
    </div>

    <div class="form-field">
        <label for="condizione_fisica">Condizione fisica</label>
        <textarea id="condizione_fisica" name="condizione_fisica">{{ pg.condizione_fisica if pg else '' }}</textarea>
    </div>

    <div class="form-field">
        <label for="ferite_attive">Ferite attive</label>
        <textarea id="ferite_attive" name="ferite_attive">{{ pg.ferite_attive if pg else '' }}</textarea>
    </div>

    <div class="form-field">
        <label for="equipaggiamento">Equipaggiamento</label>
        <textarea id="equipaggiamento" name="equipaggiamento">{{ pg.equipaggiamento if pg else '' }}</textarea>
    </div>

    <div class="form-field">
        <label for="risorse">Risorse / valuta</label>
        <textarea id="risorse" name="risorse">{{ pg.risorse if pg else '' }}</textarea>
    </div>

    <div class="form-field">
        <label for="abilita_acquisite">Abilità acquisite</label>
        <textarea id="abilita_acquisite" name="abilita_acquisite">{{ pg.abilita_acquisite if pg else '' }}</textarea>
    </div>

    <div class="form-field">
        <label for="sessione_corrente">Sessione corrente</label>
        <input type="number" id="sessione_corrente" name="sessione_corrente" value="{{ pg.sessione_corrente if pg else 0 }}">
    </div>

    <div class="form-field">
        <label for="location_attuale_id">Location attuale</label>
        <select id="location_attuale_id" name="location_attuale_id">
            <option value="">— nessuna —</option>
            {% for l in locations %}
            <option value="{{ l.id }}" {% if pg and pg.location_attuale_id == l.id %}selected{% endif %}>{{ l.nome }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-field">
        <label for="note">Note libere</label>
        <textarea id="note" name="note">{{ pg.note if pg else '' }}</textarea>
    </div>

    <div class="actions-row">
        <button type="submit" class="btn">Salva</button>
    </div>
</form>

{% endblock %}
