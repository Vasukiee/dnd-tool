{% extends "base.html" %}
{% block title %}Collega personaggio — {{ quest.nome }}{% endblock %}
{% block content %}

<div class="page-header">
    <p class="page-eyebrow">Collegamento</p>
    <h1 class="page-title">Collega un personaggio a "{{ quest.nome }}"</h1>
</div>

<form method="POST" class="form-grid">
    <div class="form-field">
        <label for="npc_id">Personaggio</label>
        <select id="npc_id" name="npc_id" required>
            {% for n in npc_list %}
            <option value="{{ n.id }}">{{ n.nome }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-field">
        <label for="ruolo_nella_quest">Ruolo in questo incarico</label>
        <input type="text" id="ruolo_nella_quest" name="ruolo_nella_quest" placeholder="es. obiettivo, alleato, informatore, ostacolo">
    </div>

    <div class="actions-row">
        <button type="submit" class="btn">Collega</button>
        <a class="btn btn--ghost" href="{{ url_for('dettaglio_quest', quest_id=quest.id) }}">Annulla</a>
    </div>
</form>

{% endblock %}
