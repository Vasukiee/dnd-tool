{% extends "base.html" %}
{% block title %}Aggiungi verità — Il Registro{% endblock %}
{% block content %}

<div class="page-header">
    <p class="page-eyebrow">Nuova voce</p>
    <h1 class="page-title">Aggiungi verità accertata</h1>
</div>

<form method="POST" class="form-grid">
    <div class="form-field">
        <label for="descrizione">Descrizione del fatto</label>
        <textarea id="descrizione" name="descrizione" required></textarea>
    </div>

    <div class="form-field">
        <label for="sessione">Sessione in cui è stato scoperto (opzionale)</label>
        <input type="number" id="sessione" name="sessione">
    </div>

    <div class="form-field">
        <label for="rilevanza">Rilevanza</label>
        <select id="rilevanza" name="rilevanza">
            {% for r in ['alta', 'media', 'bassa'] %}
            <option value="{{ r }}" {% if r == 'media' %}selected{% endif %}>{{ r }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="actions-row">
        <button type="submit" class="btn">Salva</button>
        <a class="btn btn--ghost" href="{{ url_for('lista_fatti') }}">Annulla</a>
    </div>
</form>

{% endblock %}
